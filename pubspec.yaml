name: one_home
description: A rental property connector mobile app that enables communication between buyers and sellers with location-based search.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0
  
  # Database
  firebase_core: ^2.16.0
  firebase_database: ^10.2.0
  cloud_firestore: ^4.13.0
  firebase_auth: ^4.10.0
  
  # UI & Design
  google_fonts: ^6.0.0
  flutter_svg: ^2.0.0
  smooth_page_indicator: ^1.0.1
  animated_bottom_navigation_bar: ^1.2.0
  
  # Location & Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  geocoding: ^2.1.0
  location: ^4.4.0
  
  # Chat & Messaging
  firebase_messaging: ^14.6.0
  intl: ^0.19.0
  
  # Image Handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  
  # Form & Validation
  form_builder_validators: ^9.0.0
  
  # Navigation
  go_router: ^12.0.0
  
  # Connectivity
  connectivity_plus: ^5.0.0
  
  # Logging
  logger: ^2.0.0
  
  # Time
  timeago: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/illustrations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
